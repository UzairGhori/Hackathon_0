# ══════════════════════════════════════════════════════════════════
#  AI Employee — Nginx Reverse Proxy Configuration
#  Routes traffic to Dashboard (8080) and Odoo (8069)
# ══════════════════════════════════════════════════════════════════

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=dashboard:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Upstream services
upstream ai_dashboard {
    server ai-employee:8080;
    keepalive 32;
}

upstream odoo_backend {
    server odoo:8069;
    keepalive 16;
}

# ── Main Server (Dashboard) ─────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── AI Employee Dashboard ──────────────────────────────────
    location / {
        limit_req zone=dashboard burst=20 nodelay;
        proxy_pass http://ai_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ── Health endpoint (no rate limit) ────────────────────────
    location /health {
        proxy_pass http://ai_dashboard/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── API endpoints ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://ai_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Odoo ERP (on /odoo path) ──────────────────────────────
    location /odoo/ {
        proxy_pass http://odoo_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        proxy_redirect / /odoo/;
    }

    # ── Static files cache ─────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://ai_dashboard;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|git|db|json)$ {
        deny all;
        return 404;
    }
}
